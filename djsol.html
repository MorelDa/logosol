<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>vMix DJ SOL - Centered 3D Radio Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-glow: #ff007f;
            --pink-deep: #cc0066;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
        }

        /* CAPA DE FONDO DIFUMINADO (TODA LA PANTALLA) */
        .full-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.2), rgba(0, 0, 0, 0.5));
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* CONTENEDOR CENTRAL (ALINEACIÓN PERFECTA) */
        .center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            perspective: 1200px;
            z-index: 10;
        }

        /* ESTILO 3D UNIFICADO PARA AMBOS TEXTOS */
        .text-3d {
            color: var(--white);
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            padding: 0;
            /* CAPAS DE PROFUNDIDAD 3D */
            text-shadow: 
                0 1px 0 var(--pink-glow),
                0 2px 0 var(--pink-deep),
                0 3px 0 #b30059,
                0 4px 0 #99004d,
                0 5px 0 #800040,
                0 6px 0 #660033,
                0 15px 30px rgba(0,0,0,0.7),
                0 0 40px rgba(255, 0, 127, 0.6);
            
            animation: float3D 4s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        /* RADIO PARTY (SUPERIOR) */
        .radio-party {
            font-size: 80px;
            letter-spacing: 20px;
            line-height: 1;
            margin-bottom: -10px;
        }

        /* DJ SOL (PRINCIPAL) */
        .dj-sol {
            font-size: 280px;
            letter-spacing: -10px;
            line-height: 0.85;
        }

        /* CARTEL EN VIVO (INFERIOR) */
        .live-tag {
            margin-top: 50px;
            background: var(--white);
            color: var(--pink-glow);
            font-size: 60px;
            padding: 10px 80px;
            border-radius: 60px;
            font-weight: 900;
            letter-spacing: 15px;
            box-shadow: 0 0 30px var(--white), 0 0 60px var(--pink-glow);
            animation: pulse 1.5s infinite;
        }

        /* ANIMACIONES FULES */
        @keyframes float3D {
            0%, 100% { 
                transform: translateY(0) rotateX(10deg) rotateY(-5deg); 
            }
            50% { 
                transform: translateY(-40px) rotateX(-10deg) rotateY(5deg); 
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.2); box-shadow: 0 0 50px var(--white), 0 0 80px var(--pink-glow); }
        }

        /* DESTELLO DE LUZ QUE CRUZA LA PANTALLA */
        .light-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
            top: 0;
            left: -100%;
            animation: sweep 8s infinite;
            z-index: 2;
        }

        @keyframes sweep {
            0% { left: -100%; }
            20%, 100% { left: 200%; }
        }

    </style>
</head>
<body>

    <div class="full-overlay">
        <div class="light-sweep"></div>

        <div class="center-block">
            <div class="text-3d radio-party">RADIO PARTY</div>
            <h1 class="text-3d dj-sol">DJ SOL</h1>
            <div class="live-tag">EN VIVO</div>
        </div>
    </div>

</body>
</html>
